seed: 7

data:
  airports_csv: data/sample_airline/airports.csv
  routes_csv: data/sample_airline/routes.csv
  snapshots: 12
  seasonal_strength: 0.30
  noise_std: 0.05
  self_loop: false

simulator:
  mc_rollouts: 32
  activation_threshold: 0.5
  coverage_radius_km: 900.0

model:
  hidden_dim: 64
  layers: 2
  diffusor_lr: 0.001
  diffusor_epochs: 5
  batch_size: 16
  teacher_mc_rollouts: 24
  marginal_loss_weight: 1.0
  ranking_loss_weight: 0.2

rl:
  budget: 3
  gamma: 0.95
  lr: 0.001
  buffer_capacity: 2000
  batch_size: 16
  train_episodes: 40
  warmup_episodes: 10
  target_update_every: 10
  eps_start: 1.0
  eps_end: 0.05
  eps_decay: 0.985

reward:
  beta_coverage: 0.25
  lambda_cost: 0.10
  cost_mode: geography
  constant_cost: 1.0
  distance_cost_scale: 0.0015
  use_shaping: false
  alpha_spread: 0.0
  alpha_cover: 0.0
  alpha_cost: 0.0

evaluation:
  regime: dynamic
  transfer_split: 8
  submodularity_samples: 50
  threshold_fraction: 0.9
